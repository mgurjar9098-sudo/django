      <section>
        <div class="container"></div>
        <div class="row">
          <div class="col-12">
            <h1>Your analyzer Code</h1>
            <form action="/analyze">
              <div class="mb-3">
  <label for="text3" class="form-label h1">Enter your text...</label>
  <textarea class="form-control" id="text3" rows="3" name="text1"></textarea>
</div>
<div class="form-check form-switch">
  <input class="form-check-input" type="checkbox" role="switch" id="upper" name="upper">
  <label class="form-check-label" for="upper">Upper Case</label>
</div>

<div class="form-check form-switch">
  <input class="form-check-input" type="checkbox" role="switch" id="lower" name="lower">
  <label class="form-check-label" for="lower">Lower Case</label>
</div>

<div class="form-check form-switch">
  <input class="form-check-input" type="checkbox" role="switch" id="cap" name="capital">
  <label class="form-check-label" for="cap">Capitalize</label>
</div>
     <input class="btn btn-outline-success" type="submit" value="Analyze text">
    
            </form>
          </div>
        </div>
   

      </section>
